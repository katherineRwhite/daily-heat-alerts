name: Fetch Daily Heat Alerts

on:
  schedule:
    # Runs every day at 14:00 UTC (10 AM EDT / 7 AM PDT)
    # Adjust the cron time to suit your preferred daily snapshot time.
    # Tool: https://crontab.guru
    - cron: '0 14 * * *'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write   # needed to push data.json back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Fetch heat alerts
        run: python fetch_alerts.py

      - name: Commit and push updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: daily heat alert update $(date -u +%Y-%m-%d)"
          git push
